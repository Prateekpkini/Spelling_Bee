name: spelling_bee
description: "Everest Spelling Bee – Open Championship"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Networking & File Picking
  http: ^1.2.0
  file_picker: ^8.0.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Text-to-Speech
  flutter_tts: ^4.2.0

  # Export
  excel: ^4.0.6
  pdf: ^3.11.2
  printing: ^5.14.2

  # UI & Utilities
  google_fonts: ^6.2.1
  uuid: ^4.6.0
  url_launcher: ^6.3.1
  intl: ^0.20.2
  path_provider: ^2.1.5
  universal_html: ^2.3.0
  share_plus: ^10.1.4
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
